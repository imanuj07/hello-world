name: Deploy to Boltic
on:
  push:
    branches: [main]
env:
  SERVERLESS_NAME: githubcheckcicd
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        env:
          BOLTIC_SSH_PRIVATE_KEY: ${{ secrets.BOLTIC_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${BOLTIC_SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ssh.git.boltic.io >> ~/.ssh/known_hosts
          echo "Host ssh.git.boltic.io
            IdentityFile ~/.ssh/id_rsa
            User git" >> ~/.ssh/config

      - name: Push to Boltic
        run: |
          git remote add boltic git@ssh.git.boltic.io:312fb7be-7a5b-47d7-8563-03635476d7b2/githubcheckcicd.git
          git push boltic main --force
